name: 每日更新小说并发布

on:
  schedule:
    # 每天北京时间早上8点（UTC 0点）执行
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  download-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 恢复上次下载状态
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            state.json
            output/
          key: novel-state-${{ github.run_number }}
          restore-keys: |
            novel-state-

      - name: 下载小说
        id: download
        run: python -u download_novels.py

      - name: 检查下载结果
        id: check
        run: |
          if [ -d "output" ] && [ "$(find output -name '*.txt' | wc -l)" -gt 0 ]; then
            echo "has_files=true" >> $GITHUB_OUTPUT
            FILE_COUNT=$(find output -name '*.txt' | wc -l)
            echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
            echo "✅ 找到 $FILE_COUNT 个小说文件"
            find output -name '*.txt' -exec ls -lh {} \;
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "❌ 没有下载到任何小说文件"
          fi

      - name: 获取上次Release的信息
        if: steps.check.outputs.has_files == 'true'
        id: prev
        run: |
          PREV_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "is_first_release=true" >> $GITHUB_OUTPUT
            echo "prev_tag=" >> $GITHUB_OUTPUT
          else
            echo "is_first_release=false" >> $GITHUB_OUTPUT
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 准备Release信息
        if: steps.check.outputs.has_files == 'true'
        id: release_info
        run: |
          DATE=$(date +%Y%m%d)
          TIME=$(date +%H%M%S)
          TAG="v${DATE}-${TIME}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

          TOTAL_BOOKS='${{ steps.download.outputs.total_books }}'
          TOTAL_NOVELS='${{ steps.download.outputs.total_novels }}'

          {
            echo "body<<RELEASE_EOF"
            echo "## 📚 小说自动同步更新"
            echo ""
            echo "**更新时间**: ${DATE}"
            echo ""
            echo "**处理结果**: ${TOTAL_BOOKS}/${TOTAL_NOVELS} 本成功"
            echo ""
            echo "### 📖 本次更新的小说"
            echo ""
          } >> $GITHUB_OUTPUT

          for f in output/*.txt; do
            if [ -f "$f" ]; then
              BASENAME=$(basename "$f")
              SIZE=$(du -h "$f" | cut -f1)
              echo "- **${BASENAME%.txt}** (${SIZE})" >> $GITHUB_OUTPUT
            fi
          done

          # 从 state.json 读取章节信息并写入 Release Notes
          if [ -f "state.json" ]; then
            echo "" >> $GITHUB_OUTPUT
            echo "### 📊 章节信息" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            python3 release_info.py >> $GITHUB_OUTPUT
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "**数据源**: 番茄小说 (fanqienovel.com)"
            echo ""
            echo "> 由 GitHub Actions 自动构建发布"
            echo "RELEASE_EOF"
          } >> $GITHUB_OUTPUT

      - name: 发布Release
        if: steps.check.outputs.has_files == 'true'
        run: |
          TAG="${{ steps.release_info.outputs.tag }}"
          gh release create "$TAG" \
            --title "📚 小说更新 - ${{ steps.release_info.outputs.date }}" \
            --notes "${{ steps.release_info.outputs.body }}" \
            output/*.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧版本Release（仅保留最新3个）
        if: steps.check.outputs.has_files == 'true'
        run: |
          TAGS=$(gh release list --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          COUNT=0
          for TAG in $TAGS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "删除旧版本: $TAG"
              gh release delete "$TAG" --yes --cleanup-tag
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 保存状态到仓库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json novels.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📝 更新下载状态 [skip ci]"
          git push || true

      - name: 发送邮件通知
        if: steps.check.outputs.has_files == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "📖 小说更新通知 - ${{ steps.release_info.outputs.date }}"
          to: 282000500@qq.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            小说自动同步更新通知
            =====================

            📅 更新时间: ${{ steps.release_info.outputs.date }}
            📊 处理结果: ${{ steps.download.outputs.total_books }}/${{ steps.download.outputs.total_novels }} 本成功

            📦 下载的小说文件已发布到 GitHub Release

            ---
            此邮件由 GitHub Actions 自动发送

      - name: 输出跳过信息
        if: steps.check.outputs.has_files != 'true'
        run: echo "📌 没有成功下载任何小说，本次跳过发布。"
