name: 每日更新小说并发布

on:
  schedule:
    # 每天北京时间早上8点（UTC 0点）执行
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  download-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 恢复上次下载缓存
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            state.json
            output/
            tomato_data/downloads/
            bin/
          key: novel-cache-v3-${{ github.run_number }}
          restore-keys: |
            novel-cache-v3-

      - name: 验证缓存一致性
        run: |
          # 如果 state.json 记录了内容文件，但文件不存在，则清除 state
          if [ -f "state.json" ]; then
            python3 -c "
          import json, os
          with open('state.json', 'r') as f:
              state = json.load(f)
          needs_reset = False
          for book_id, info in state.items():
              cf = info.get('content_file', '')
              if cf and not os.path.exists(cf):
                  print(f'⚠️ 缓存文件不存在: {cf}，将从头下载')
                  needs_reset = True
          if needs_reset:
              with open('state.json', 'w') as f:
                  json.dump({}, f)
              print('🔄 已重置 state.json')
          else:
              print('✅ 缓存状态一致')
          "
          fi

      - name: 下载小说
        id: download
        run: python -u download_novels.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 检查下载结果
        id: check
        run: |
          if [ -d "output" ] && [ "$(find output -maxdepth 1 -name '*.txt' -o -name '*.epub' | wc -l)" -gt 0 ]; then
            echo "has_files=true" >> $GITHUB_OUTPUT
            FILE_COUNT=$(find output -maxdepth 1 \( -name '*.txt' -o -name '*.epub' \) | wc -l)
            echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
            echo "✅ 找到 $FILE_COUNT 个小说文件"
            find output -maxdepth 1 \( -name '*.txt' -o -name '*.epub' \) -exec ls -lh {} \;
            # 检查音频文件夹
            AUDIO_DIRS=$(find output -maxdepth 1 -type d -name '*_audio' | wc -l)
            if [ "$AUDIO_DIRS" -gt 0 ]; then
              echo "has_audio=true" >> $GITHUB_OUTPUT
              echo "🔊 找到 $AUDIO_DIRS 个音频文件夹"
            else
              echo "has_audio=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "has_audio=false" >> $GITHUB_OUTPUT
            echo "❌ 没有下载到任何小说文件"
          fi

      - name: 打包音频文件
        if: steps.check.outputs.has_audio == 'true'
        run: |
          cd output
          for dir in *_audio; do
            if [ -d "$dir" ]; then
              echo "📦 打包音频: $dir"
              zip -r "${dir}.zip" "$dir"
              echo "  ✅ 已生成: ${dir}.zip ($(du -h "${dir}.zip" | cut -f1))"
            fi
          done

      - name: 获取上次Release的信息
        if: steps.check.outputs.has_files == 'true'
        id: prev
        run: |
          PREV_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "is_first_release=true" >> $GITHUB_OUTPUT
            echo "prev_tag=" >> $GITHUB_OUTPUT
          else
            echo "is_first_release=false" >> $GITHUB_OUTPUT
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 准备Release信息
        if: steps.check.outputs.has_files == 'true'
        id: release_info
        run: |
          DATE=$(date +%Y%m%d)
          TIME=$(date +%H%M%S)
          TAG="v${DATE}-${TIME}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

          TOTAL_BOOKS='${{ steps.download.outputs.total_books }}'
          TOTAL_NOVELS='${{ steps.download.outputs.total_novels }}'

          {
            echo "body<<RELEASE_EOF"
            echo "## 📚 小说自动同步更新"
            echo ""
            echo "**更新时间**: ${DATE}"
            echo ""
            echo "**处理结果**: ${TOTAL_BOOKS}/${TOTAL_NOVELS} 本成功"
            echo ""
            echo "### 📖 本次更新的小说"
            echo ""
          } >> $GITHUB_OUTPUT

          for f in output/*.txt output/*.epub; do
            if [ -f "$f" ]; then
              BASENAME=$(basename "$f")
              SIZE=$(du -h "$f" | cut -f1)
              echo "- **${BASENAME%.*}** (${SIZE})" >> $GITHUB_OUTPUT
            fi
          done

          # 音频信息
          for f in output/*_audio.zip; do
            if [ -f "$f" ]; then
              BASENAME=$(basename "$f")
              SIZE=$(du -h "$f" | cut -f1)
              echo "- 🔊 **${BASENAME%.zip}** (${SIZE})" >> $GITHUB_OUTPUT
            fi
          done

          # 从 state.json 读取章节信息并写入 Release Notes
          if [ -f "state.json" ]; then
            echo "" >> $GITHUB_OUTPUT
            echo "### 📊 章节信息" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            python3 release_info.py >> $GITHUB_OUTPUT
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "**数据源**: 番茄小说 (fanqienovel.com)"
            echo ""
            echo "**下载引擎**: [Tomato-Novel-Downloader](https://github.com/zhongbai2333/Tomato-Novel-Downloader)"
            echo ""
            echo "> 由 GitHub Actions 自动构建发布"
            echo "RELEASE_EOF"
          } >> $GITHUB_OUTPUT

      - name: 发布Release
        if: steps.check.outputs.has_files == 'true'
        run: |
          TAG="${{ steps.release_info.outputs.tag }}"
          # 收集要上传的文件
          FILES=""
          for f in output/*.txt output/*.epub output/*_audio.zip; do
            if [ -f "$f" ]; then
              FILES="$FILES $f"
            fi
          done
          gh release create "$TAG" \
            --title "📚 小说更新 - ${{ steps.release_info.outputs.date }}" \
            --notes "${{ steps.release_info.outputs.body }}" \
            $FILES
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧版本Release（仅保留最新3个）
        if: steps.check.outputs.has_files == 'true'
        run: |
          TAGS=$(gh release list --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          COUNT=0
          for TAG in $TAGS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "删除旧版本: $TAG"
              gh release delete "$TAG" --yes --cleanup-tag
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 保存状态到仓库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json novels.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📝 更新下载状态 [skip ci]"
          git push || true

      - name: 生成邮件正文
        if: steps.check.outputs.has_files == 'true'
        id: mail_body
        run: |
          python3 << 'PYEOF'
          import json, os

          details_raw = os.environ.get("NOVEL_DETAILS", "[]")
          date_str = os.environ.get("RELEASE_DATE", "")
          total_books = os.environ.get("TOTAL_BOOKS", "0")
          total_novels = os.environ.get("TOTAL_NOVELS", "0")
          repo_url = os.environ.get("GITHUB_REPO_URL", "")

          try:
              details = json.loads(details_raw)
          except Exception:
              details = []

          lines = []
          lines.append("📚 HX-NovelSync 小说自动同步更新通知")
          lines.append("=" * 42)
          lines.append("")
          lines.append(f"📅 更新时间: {date_str}")
          lines.append(f"📊 处理结果: {total_books}/{total_novels} 本成功")
          lines.append("")

          success = [d for d in details if d.get("success")]
          failed = [d for d in details if not d.get("success")]

          if success:
              lines.append("📖 更新详情:")
              lines.append("-" * 42)
              for r in success:
                  name = r.get("name", "未知")
                  author = r.get("author", "未知")
                  new_ch = r.get("new_chapters", 0)
                  total_ch = r.get("total_chapters", 0)
                  fail_ch = r.get("fail_count", 0)
                  latest = r.get("latest_chapter", "")
                  size = r.get("file_size", 0)
                  size_mb = size / 1024 / 1024 if size else 0
                  audio_count = r.get("audio_count", 0)

                  lines.append("")
                  lines.append(f"  📕 《{name}》 - {author}")
                  if new_ch > 0:
                      lines.append(f"     🆕 本次新增: {new_ch} 章")
                  else:
                      lines.append(f"     ✅ 无新章节")
                  lines.append(f"     📊 总章节数: {total_ch} 章")
                  if latest:
                      lines.append(f"     📖 最新章节: {latest}")
                  if size_mb > 0:
                      lines.append(f"     💾 文件大小: {size_mb:.1f} MB")
                  if fail_ch > 0:
                      lines.append(f"     ⚠️ 失败章节: {fail_ch} 章")
                  if audio_count > 0:
                      lines.append(f"     🔊 有声书: {audio_count} 个音频文件")

          if failed:
              lines.append("")
              lines.append("❌ 失败列表:")
              lines.append("-" * 42)
              for r in failed:
                  name = r.get("name", "未知")
                  author = r.get("author", "未知")
                  reason = r.get("reason", "未知原因")
                  lines.append(f"  ❌ 《{name}》 - {author} ({reason})")

          lines.append("")
          lines.append("=" * 42)
          if repo_url:
              lines.append(f"📦 前往 Release 下载: {repo_url}/releases")
          else:
              lines.append("📦 下载的小说文件已发布到 GitHub Release")
          lines.append("")
          lines.append("-- ")
          lines.append("此邮件由 GitHub Actions 自动发送")

          body = "\n".join(lines)

          # 写入 GITHUB_OUTPUT (使用 heredoc 格式处理多行)
          output_file = os.environ.get("GITHUB_OUTPUT", "")
          if output_file:
              with open(output_file, "a", encoding="utf-8") as f:
                  f.write("mail_body<<MAIL_EOF\n")
                  f.write(body + "\n")
                  f.write("MAIL_EOF\n")

          # 同时生成邮件主题
          subject_parts = []
          for r in success:
              name = r.get("name", "")
              new_ch = r.get("new_chapters", 0)
              if name and new_ch > 0:
                  subject_parts.append(f"《{name}》+{new_ch}章")
              elif name:
                  subject_parts.append(f"《{name}》无更新")
          if not subject_parts:
              subject_line = f"📖 小说更新通知 - {date_str}"
          elif len(subject_parts) == 1:
              subject_line = f"📖 {subject_parts[0]} - {date_str}"
          else:
              subject_line = f"📖 {', '.join(subject_parts)} - {date_str}"

          if output_file:
              with open(output_file, "a", encoding="utf-8") as f:
                  f.write(f"mail_subject={subject_line}\n")
          PYEOF
        env:
          NOVEL_DETAILS: ${{ steps.download.outputs.details }}
          RELEASE_DATE: ${{ steps.release_info.outputs.date }}
          TOTAL_BOOKS: ${{ steps.download.outputs.total_books }}
          TOTAL_NOVELS: ${{ steps.download.outputs.total_novels }}
          GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}

      - name: 发送邮件通知
        if: steps.check.outputs.has_files == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.mail_body.outputs.mail_subject }}
          to: 282000500@qq.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: ${{ steps.mail_body.outputs.mail_body }}

      - name: 输出跳过信息
        if: steps.check.outputs.has_files != 'true'
        run: echo "📌 没有成功下载任何小说，本次跳过发布。"
